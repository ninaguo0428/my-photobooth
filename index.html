<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photobooth</title>
    <style>
        body{
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background:#f0f0f0;
            padding-top: 50px;
        }
        /*攝影機視窗*/
        #camera-container{
            width: 350px;
            height: 450px;
            background: #000;
            border: 5px solid #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }
        video{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #snap-btn{
            margin-top: 30px;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(180deg,#ffb2c5 0%,#ff85a2 100%);
            border: 4px solid #ffffff;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(255,133,162,0.4),inset 0-4px 8px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            font-family: 'MyCuteFont',sans-serif;
        }
        #snap-btn:hover{
            background: linear-gradient(180deg,#ffc4d4 0%,#ff97b2 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(229, 159, 176, 0.5);
            border-color: #fff0f5;
        }
        #sanp-btn:active{
            background-color: #ca94a2;
            transform: translateY(1px) scale(0.95);
            box-shadow: 0 2px 10px rgba(219, 126, 147, 0.3);
        }
        @font-face{
            font-family: 'MyCuteFont';
            src:url('TMT-Paint-Regular.otf');
        }
        .photobooth-window{
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .photo-title{
            font-family: 'MyCuteFont',sans-serif;
            font-size: 32px;
            color: black;
            background: white;
            border-style: double;
            border-width: 4px;
            border-color:black;
            padding: 8px 25px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="photobooth-window"><div class="photo-title">PHOTOBOOTH</div></div>
   <div id="camera-container">
    <video id="video" width="640" height="480" autoplay playsinline></video>
        </div>
    
    <button id="snap-btn">click</button>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap');
        const resultImg = document.getElementById('result-img');
        const hint = document.getElementById('hint');

        // 1. 啟動相機 (這是我剛剛漏掉的，該死！)
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
            } catch (err) {
                alert("相機打不開喔！請檢查權限：" + err);
            }
        }

        // 2. 拍照按鈕點擊
        snap.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // 畫圖
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 轉成圖片顯示
            const dataUrl = canvas.toDataURL('image/png');
            resultImg.src = dataUrl;
            resultImg.style.display = 'block';
            hint.style.display = 'block';
            
            // 拍完後自動滾動到照片那
            resultImg.scrollIntoView({ behavior: 'smooth' });
        });

        // 執行啟動
        initCamera();
    </script>
        
</body>
</html>
