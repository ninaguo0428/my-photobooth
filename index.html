<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photobooth</title>
    <style>
        body{
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background:#f0f0f0;
            padding-top: 50px;
        }
        /*攝影機視窗*/
        #camera-container{
            width: 350px;
            height: 450px;
            background: #000;
            border: 5px solid #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }
        video{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #snap-btn{
            margin-top: 30px;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(180deg,#ffb2c5 0%,#ff85a2 100%);
            border: 4px solid #ffffff;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(255,133,162,0.4),inset 0-4px 8px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            font-family: 'MyCuteFont',sans-serif;
        }
        #snap-btn:hover{
            background: linear-gradient(180deg,#ffc4d4 0%,#ff97b2 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(229, 159, 176, 0.5);
            border-color: #fff0f5;
        }
        #sanp-btn:active{
            background-color: #ca94a2;
            transform: translateY(1px) scale(0.95);
            box-shadow: 0 2px 10px rgba(219, 126, 147, 0.3);
        }
        @font-face{
            font-family: 'MyCuteFont';
            src:url('TMT-Paint-Regular.otf');
        }
        .photobooth-window{
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .photo-title{
            font-family: 'MyCuteFont',sans-serif;
            font-size: 32px;
            color: black;
            background: white;
            border-style: double;
            border-width: 4px;
            border-color:black;
            padding: 8px 25px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="photobooth-window"><div class="photo-title">PHOTOBOOTH</div></div>
   <div id="camera-container">
    <video id="video" width="640" height="480" autoplay playsinline></video>
        </div>
    
    <button id="snap-btn">click</button>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snapBtn = document.getElementById('snap-btn');
    
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("相機開啟失敗", err);
            }
        }
    
        // 啟動相機
        initCamera();
    
        // 拍照邏輯
        // 拍照邏輯 (長按儲存版)
snapBtn.addEventListener('click', () => {
    const context = canvas.getContext('2d');
    
    // 確保抓到相機真實的解析度
    const w = video.videoWidth;
    const h = video.videoHeight;
    
    if (w === 0 || h === 0) {
        alert("相機還沒準備好，再等一秒喔！");
        return;
    }

    canvas.width = w;
    canvas.height = h;
    
    // 1. 畫圖
    context.drawImage(video, 0, 0, w, h);
    
    // 2. 轉成圖片資料
    const dataUrl = canvas.toDataURL('image/png');

    // 3. 找出或建立圖片標籤
    let resultImg = document.getElementById('result-img');
    if (!resultImg) {
        // 如果是第一次拍，建立一個容器
        const container = document.createElement('div');
        container.style.textAlign = 'center';
        container.style.marginTop = '20px';
        
        // 加一行可愛的提示字
        const tip = document.createElement('p');
        tip.innerText = "✨ 拍好囉！長按圖片即可儲存 ✨";
        tip.style.fontFamily = "'MyCuteFont', sans-serif"; // 用你的潮字體
        tip.style.fontSize = "16px";
        
        resultImg = document.createElement('img');
        resultImg.id = 'result-img';
        resultImg.style.width = '90%'; // 讓它縮一點點比較好看
        resultImg.style.maxWidth = '500px';
        resultImg.style.borderRadius = '15px';
        resultImg.style.border = '6px double black'; // 配你的雙線條風格！
        
        container.appendChild(tip);
        container.appendChild(resultImg);
        document.body.appendChild(container);
    }

    // 4. 更新圖片路徑
    resultImg.src = dataUrl;

    // 自動捲動到圖片位置，讓使用者知道拍好了
    resultImg.scrollIntoView({ behavior: 'smooth' });
    
    console.log("照片已產出，長按儲存！");
});
        });
    </script>
        
</body>
</html>
